spring.application.name=api-gateway
server.port=8080
server.address=0.0.0.0

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://user-service.default.svc.cluster.local:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=http://product-service.default.svc.cluster.local:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/products/**

spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=http://order-service.default.svc.cluster.local:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/orders/**
